# New-API 高可用负载均衡配置
# 将此文件挂载到 Nginx 容器 /etc/nginx/conf.d/default.conf
# 或复制到宿主机 Nginx 配置目录

upstream new_api_backend {
    # least_conn 策略适合 AI 流式响应，避免长连接堆积在单一节点
    least_conn;

    # Master 节点（权重略高，兼顾定时任务和请求处理）
    server new-api-master:3000 weight=5 max_fails=3 fail_timeout=30s;

    # Worker 节点（专门处理请求）
    server new-api-worker:3000 weight=5 max_fails=3 fail_timeout=30s;

    # 如需添加更多 Worker，在此处增加 server 行
    # server new-api-worker-2:3000 weight=5 max_fails=3 fail_timeout=30s;

    # 长连接池，减少 TCP 握手开销
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 生产环境请替换为实际域名，如 api.example.com

    # HTTP 强制跳转到 HTTPS（Let's Encrypt 验证路径除外）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;  # 生产环境请替换为实际域名

    # ❗ 生产环境必须配置真实证书（Let's Encrypt 或自签名）
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # 日志配置
    access_log /var/log/nginx/new-api.access.log;
    error_log /var/log/nginx/new-api.error.log warn;

    # 客户端请求体大小限制（支持文件上传等场景）
    client_max_body_size 128m;

    # 健康检查端点（Nginx 本身不直接支持主动健康检查，
    # 此处配置被动检查：max_fails + fail_timeout）
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # 主入口：反向代理到 New-API 后端
    location / {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;

        # 保留客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如需实时功能）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 流式响应关键配置：关闭缓冲，确保 SSE 实时推送
        proxy_buffering off;
        proxy_cache off;

        # 长连接超时（AI 推理可能耗时较长）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # 错误处理：后端不可用时返回友好提示
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # 静态错误页面
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

