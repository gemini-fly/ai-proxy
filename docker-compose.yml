# New-API 本地开发环境 - 仅启动数据库服务
# 前端和后端在本地直接运行，数据库通过 Docker 提供
#
# 启动数据库: docker-compose up -d
# 启动后端:   go run main.go  (另开终端，需先配置 .env)
# 启动前端:   cd web && bun dev  (另开终端)

version: '3.4'

services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    ports:
      - "5432:5432"  # 暴露给本地后端访问
    volumes:
      - pg_data:/var/lib/postgresql/data

